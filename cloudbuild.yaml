substitutions:
  _TERRAFORM_VERSION: 1.9.8
  _STATE_BUCKET: kita-infra
  _APPLY: "false"

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/cloudkite-cloud-build@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  - id: terraform-format
    name: hashicorp/terraform:${_TERRAFORM_VERSION}
    dir: infra-modules
    args:
      - fmt
      - -check
      - -recursive

  - id: terraform-init
    name: hashicorp/terraform:${_TERRAFORM_VERSION}
    dir: infra-modules
    entrypoint: sh
    args:
      - -ceu
      - |
        printf 'terraform {\n  backend "gcs" {}\n}\n' > backend.generated.tf
        terraform init \
          -input=false \
          -backend-config="bucket=${_STATE_BUCKET}" \
          -backend-config="prefix=cloudkite/platform"

  - id: terraform-validate
    name: hashicorp/terraform:${_TERRAFORM_VERSION}
    dir: infra-modules
    args:
      - validate

  - id: terraform-plan
    name: hashicorp/terraform:${_TERRAFORM_VERSION}
    dir: infra-modules
    entrypoint: sh
    args:
      - -ceu
      - |
        terraform plan \
          -input=false \
          -lock-timeout=5m \
          -out=/workspace/cloudkite.tfplan \
          -var="project_id=${PROJECT_ID}"

  - id: terraform-apply
    name: hashicorp/terraform:${_TERRAFORM_VERSION}
    dir: infra-modules
    entrypoint: sh
    args:
      - -ceu
      - |
        if [ "${_APPLY}" != "true" ] || { [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "master" ]; }; then
          echo "Apply skipped; plan completed for ${BRANCH_NAME}"
          exit 0
        fi
        terraform apply -input=false -auto-approve /workspace/cloudkite.tfplan
